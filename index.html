<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keterlambatan Siswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        #reader video { border-radius: 24px; object-fit: cover; width: 100% !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media print { 
            .print-hidden { display: none !important; } 
            body { background: white; } 
            .print-card { border: none !important; shadow: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icons = {
            Camera: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
            History: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
            Printer: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
            UserPlus: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            CheckCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            AlertTriangle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Stop: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/></svg>,
            FileUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Book: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            Filter: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        };

        const MONTHS = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        const INITIAL_STUDENTS = [
            { id: '2024001', name: 'Ahmad Fauzi', class: '7-A' },
            { id: '2023045', name: 'Larasati Putri', class: '8-C' },
            { id: '2022089', name: 'Kevin Pratama', class: '9-F' }
        ];

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [students, setStudents] = useState(INITIAL_STUDENTS);
            const [lateLogs, setLateLogs] = useState([]);
            const [activeTab, setActiveTab] = useState('scan');
            const [scanResult, setScanResult] = useState('');
            const [statusMsg, setStatusMsg] = useState({ type: '', text: '', subText: '' });
            const [searchTerm, setSearchTerm] = useState('');
            const [isScannerActive, setIsScannerActive] = useState(false);
            const [bulkInput, setBulkInput] = useState('');
            const [showBulkModal, setShowBulkModal] = useState(false);
            const [currentDateTime, setCurrentDateTime] = useState('');
            
            // State untuk filter bulan rekapan
            const [filterMonth, setFilterMonth] = useState(new Date().getMonth());
            const [filterYear, setFilterYear] = useState(new Date().getFullYear());

            const THRESHOLD = 5;
            const LOGO_URL = "https://i.ibb.co.com/TDbjTCHF/logo.png";

            useEffect(() => {
                const savedLogs = localStorage.getItem('lateLogs_v3');
                const savedStudents = localStorage.getItem('students_v3');
                const savedUser = localStorage.getItem('currentUser_v3');
                if (savedLogs) setLateLogs(JSON.parse(savedLogs));
                if (savedStudents) setStudents(JSON.parse(savedStudents));
                if (savedUser) setCurrentUser(JSON.parse(savedUser));

                const updateClock = () => {
                    const now = new Date();
                    const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
                    setCurrentDateTime(now.toLocaleDateString('id-ID', options));
                };
                updateClock();
                const timer = setInterval(updateClock, 60000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                localStorage.setItem('lateLogs_v3', JSON.stringify(lateLogs));
                localStorage.setItem('students_v3', JSON.stringify(students));
                if (currentUser) localStorage.setItem('currentUser_v3', JSON.stringify(currentUser));
            }, [lateLogs, students, currentUser]);

            const handleRecordLate = (nisn) => {
                const student = students.find(s => s.id === nisn);
                if (!student) {
                    setStatusMsg({ type: 'error', text: `Siswa ${nisn} Tidak Ditemukan!`, subText: 'Daftarkan di menu Database Siswa.' });
                    return;
                }
                const now = new Date();
                // Hitung frekuensi hanya di bulan berjalan
                const freq = lateLogs.filter(log => {
                    const logDate = new Date(log.id);
                    return log.nisn === nisn && logDate.getMonth() === now.getMonth() && logDate.getFullYear() === now.getFullYear();
                }).length + 1;

                const newLog = {
                    id: Date.now(),
                    nisn: student.id,
                    name: student.name,
                    class: student.class,
                    timestamp: now.toLocaleString('id-ID'),
                    recordedBy: currentUser.name 
                };

                setLateLogs(prev => [newLog, ...prev]);

                if (freq >= THRESHOLD) {
                    setStatusMsg({ type: 'warning', text: `PERINGATAN: ${student.name}`, subText: `Sudah ${freq}x terlambat bulan ini. Serahkan ke Guru BK!` });
                } else {
                    setStatusMsg({ type: 'success', text: `Dicatat: ${student.name}`, subText: `Keterlambatan ke-${freq} bulan ini.` });
                }
                
                setScanResult('');
                setTimeout(() => setStatusMsg({ type: '', text: '', subText: '' }), 5000);
            };

            // Menghasilkan rekapan berdasarkan filter bulan/tahun
            const filteredRecap = useMemo(() => {
                const recap = {};
                lateLogs.forEach(log => {
                    const logDate = new Date(log.id);
                    if (logDate.getMonth() === parseInt(filterMonth) && logDate.getFullYear() === parseInt(filterYear)) {
                        if (!recap[log.nisn]) {
                            const sInfo = students.find(s => s.id === log.nisn);
                            recap[log.nisn] = { id: log.nisn, name: sInfo?.name || 'Siswa Terhapus', class: sInfo?.class || '-', count: 0 };
                        }
                        recap[log.nisn].count += 1;
                    }
                });
                return Object.values(recap).sort((a, b) => b.count - a.count);
            }, [lateLogs, filterMonth, filterYear, students]);

            // Mendapatkan daftar tahun yang tersedia di log
            const availableYears = useMemo(() => {
                const years = new Set([new Date().getFullYear()]);
                lateLogs.forEach(log => years.add(new Date(log.id).getFullYear()));
                return Array.from(years).sort((a, b) => b - a);
            }, [lateLogs]);

            const handleLogin = (e) => {
                e.preventDefault();
                const name = e.target.teacherName.value;
                if (!name.trim()) return;
                setCurrentUser({ name, time: new Date().toLocaleDateString('id-ID') });
            };

            if (!currentUser) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
                        <div className="w-full max-w-md bg-white rounded-[40px] shadow-2xl overflow-hidden">
                            <div className="p-10 text-center bg-blue-600 text-white">
                                <div className="bg-white p-5 w-24 h-24 rounded-3xl shadow-xl mx-auto mb-6 flex items-center justify-center">
                                    <img src={LOGO_URL} className="w-16 h-16 object-contain" />
                                </div>
                                <h1 className="text-xl font-black uppercase tracking-tight">SISTEM KETERLAMBATAN SISWA</h1>
                                <p className="text-blue-100 text-[10px] font-bold uppercase tracking-widest mt-2 opacity-80">Portal Akses Guru Piket</p>
                            </div>
                            <div className="p-10">
                                <form onSubmit={handleLogin} className="space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nama Guru Piket</label>
                                        <div className="relative">
                                            <span className="absolute left-4 top-3.5 text-slate-300"><Icons.User /></span>
                                            <input name="teacherName" required placeholder="Masukkan nama..." className="w-full border-2 border-slate-100 rounded-2xl p-3.5 pl-12 outline-none focus:border-blue-500 transition-all font-bold" />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-black transition-all">Mulai Tugas</button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col pb-24">
                    <header className="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-20 print-hidden">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src={LOGO_URL} className="w-10 h-10 object-contain bg-white rounded-lg p-1" />
                                <h1 className="text-sm font-black uppercase hidden sm:block">SISTEM KETERLAMBATAN SISWA</h1>
                                <h1 className="text-sm font-black uppercase sm:hidden">SK SISWA</h1>
                            </div>
                            <div className="flex items-center gap-2 sm:gap-4">
                                <div className="text-right flex flex-col items-end">
                                    <div className="text-[10px] font-bold uppercase text-blue-200">Piket: {currentUser.name}</div>
                                    <div className="text-[10px] font-black uppercase bg-blue-700/50 px-2 py-0.5 rounded mt-0.5 hidden xs:block">{currentDateTime}</div>
                                </div>
                                <button onClick={() => {setCurrentUser(null); localStorage.removeItem('currentUser_v3');}} className="bg-red-500 hover:bg-red-600 p-2.5 rounded-xl transition-all shadow-md active:scale-95"><Icons.LogOut /></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto w-full p-4 flex-1">
                        <nav className="flex gap-1 mb-6 bg-white p-1 rounded-2xl shadow-sm border border-slate-200 overflow-x-auto no-scrollbar print-hidden">
                            {[
                                { id: 'scan', label: 'Scanner', icon: Icons.Camera },
                                { id: 'history', label: 'Riwayat', icon: Icons.History },
                                { id: 'recap', label: 'Laporan BK', icon: Icons.Printer },
                                { id: 'admin', label: 'Database', icon: Icons.UserPlus },
                                { id: 'guide', label: 'Bantuan', icon: Icons.Book },
                            ].map((tab) => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 min-w-fit py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all font-bold text-xs ${activeTab === tab.id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    <tab.icon /> <span>{tab.label}</span>
                                </button>
                            ))}
                        </nav>

                        {activeTab === 'scan' && (
                            <div className="space-y-4">
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-4 bg-slate-900 relative aspect-video flex items-center justify-center">
                                        {!isScannerActive ? (
                                            <button onClick={() => setIsScannerActive(true)} className="flex flex-col items-center gap-4 text-white">
                                                <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center animate-pulse shadow-2xl"><Icons.Camera /></div>
                                                <span className="font-black text-xs uppercase tracking-widest">Aktifkan Kamera</span>
                                            </button>
                                        ) : (
                                            <div id="reader" className="w-full max-w-sm rounded-3xl overflow-hidden border-4 border-blue-500"></div>
                                        )}
                                        {isScannerActive && <button onClick={() => setIsScannerActive(false)} className="absolute top-4 right-4 bg-red-500 text-white p-2 rounded-full"><Icons.Stop /></button>}
                                    </div>
                                    <div className="p-6 space-y-4">
                                        <div className="relative">
                                            <input type="text" value={scanResult} onChange={(e) => setScanResult(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleRecordLate(scanResult)} placeholder="Input manual NISN..." className="w-full border-2 border-slate-100 rounded-2xl p-4 pr-24 outline-none focus:border-blue-500 font-bold bg-slate-50 transition-all" />
                                            <button onClick={() => handleRecordLate(scanResult)} className="absolute right-2 top-2 bottom-2 bg-blue-600 text-white px-5 rounded-xl font-bold text-[10px] uppercase">Catat</button>
                                        </div>
                                        {statusMsg.text && (
                                            <div className={`p-4 rounded-2xl flex items-start gap-3 border-2 animate-in slide-in-from-top-2 ${statusMsg.type === 'success' ? 'bg-green-50 text-green-700 border-green-200' : statusMsg.type === 'warning' ? 'bg-orange-50 text-orange-700 border-orange-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                                                <div className="mt-1">{statusMsg.type === 'success' ? <Icons.CheckCircle /> : <Icons.AlertTriangle />}</div>
                                                <div><span className="font-black block uppercase text-sm">{statusMsg.text}</span><span className="text-xs opacity-80">{statusMsg.subText}</span></div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-4 border-b bg-slate-50 flex justify-between items-center">
                                    <h2 className="font-bold text-xs uppercase flex items-center gap-2"><Icons.History /> Riwayat Kedatangan</h2>
                                    <button onClick={() => setLateLogs([])} className="text-red-500 text-[10px] font-black uppercase">Reset Log</button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 text-slate-400 font-bold text-[10px] uppercase">
                                            <tr><th className="p-4">Siswa</th><th className="p-4">Waktu</th><th className="p-4">Piket</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {lateLogs.length > 0 ? lateLogs.map(log => (
                                                <tr key={log.id} className="hover:bg-slate-50">
                                                    <td className="p-4"><div className="font-bold">{log.name}</div><div className="text-[10px] text-slate-400">{log.nisn} • {log.class}</div></td>
                                                    <td className="p-4 font-bold text-blue-600 text-xs">{log.timestamp}</td>
                                                    <td className="p-4 text-slate-400 text-[10px] uppercase">{log.recordedBy}</td>
                                                </tr>
                                            )) : <tr><td colSpan="3" className="p-10 text-center text-slate-300 font-bold uppercase text-[10px]">Belum ada data</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'recap' && (
                            <div className="space-y-4">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 print-hidden">
                                    <div className="flex items-center gap-2 bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                                        <div className="p-2 bg-blue-50 text-blue-600 rounded-lg"><Icons.Filter /></div>
                                        <select value={filterMonth} onChange={(e) => setFilterMonth(e.target.value)} className="bg-transparent text-[11px] font-black uppercase outline-none cursor-pointer">
                                            {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
                                        </select>
                                        <select value={filterYear} onChange={(e) => setFilterYear(e.target.value)} className="bg-transparent text-[11px] font-black uppercase outline-none cursor-pointer border-l pl-2 ml-1">
                                            {availableYears.map(y => <option key={y} value={y}>{y}</option>)}
                                        </select>
                                    </div>
                                    <button onClick={() => window.print()} className="bg-slate-900 text-white px-5 py-3 rounded-2xl text-[10px] font-black flex items-center gap-2 uppercase tracking-widest shadow-lg hover:bg-black transition-all"><Icons.Printer /> Cetak Laporan</button>
                                </div>

                                <div className="bg-white rounded-[32px] shadow-sm border border-slate-200 overflow-hidden print-card">
                                    <div className="hidden print:block p-10 text-center border-b-4 border-double border-slate-900 mb-6">
                                        <div className="flex justify-center mb-4">
                                            <img src={LOGO_URL} className="w-20 h-20 object-contain" />
                                        </div>
                                        <h1 className="text-2xl font-black uppercase tracking-tight">Laporan Keterlambatan Siswa</h1>
                                        <p className="text-sm font-bold uppercase text-slate-500 mt-1">Periode: {MONTHS[filterMonth]} {filterYear}</p>
                                        <p className="text-[10px] font-medium uppercase text-slate-400 mt-4 tracking-widest">Dicetak pada: {new Date().toLocaleString('id-ID')}</p>
                                    </div>

                                    <div className="p-6 border-b bg-slate-50 flex justify-between items-center print-hidden">
                                        <h2 className="font-black uppercase text-[10px] text-slate-400 tracking-widest">Daftar Akumulasi • {MONTHS[filterMonth]} {filterYear}</h2>
                                        <span className="text-[10px] font-bold px-2 py-1 bg-blue-100 text-blue-600 rounded-lg">{filteredRecap.length} Siswa Terdeteksi</span>
                                    </div>

                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 text-slate-400 font-bold text-[10px] uppercase">
                                            <tr><th className="p-4">Siswa</th><th className="p-4 text-center">Total</th><th className="p-4">Tindakan Lanjutan</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredRecap.length > 0 ? filteredRecap.map(item => (
                                                <tr key={item.id} className={item.count >= THRESHOLD ? 'bg-red-50/50' : ''}>
                                                    <td className="p-4">
                                                        <div className="font-bold text-slate-800">{item.name}</div>
                                                        <div className="text-[10px] text-slate-400 font-medium">NISN: {item.id} • KLS {item.class}</div>
                                                    </td>
                                                    <td className="p-4 text-center">
                                                        <span className={`inline-flex items-center justify-center w-8 h-8 rounded-xl font-black text-xs ${item.count >= THRESHOLD ? 'bg-red-600 text-white shadow-lg shadow-red-200' : 'bg-slate-100 text-slate-600'}`}>
                                                            {item.count}
                                                        </span>
                                                    </td>
                                                    <td className="p-4">
                                                        <div className={`text-[10px] font-black uppercase tracking-wider ${item.count >= THRESHOLD ? 'text-red-600' : 'text-slate-400'}`}>
                                                            {item.count >= THRESHOLD ? (
                                                                <div className="flex items-center gap-2">
                                                                    <Icons.AlertTriangle />
                                                                    <span>Panggilan Orang Tua & SP-1</span>
                                                                </div>
                                                            ) : 'Teguran & Pembinaan'}
                                                        </div>
                                                    </td>
                                                </tr>
                                            )) : (
                                                <tr>
                                                    <td colSpan="3" className="p-20 text-center">
                                                        <div className="flex flex-col items-center gap-3 opacity-20">
                                                            <Icons.History />
                                                            <span className="font-black uppercase text-[10px] tracking-widest">Tidak ada data keterlambatan di periode ini</span>
                                                        </div>
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                    
                                    <div className="hidden print:grid grid-cols-2 gap-20 p-12 mt-10">
                                        <div className="text-center space-y-20">
                                            <p className="font-bold text-xs uppercase tracking-widest">Guru Piket,</p>
                                            <div className="border-t-2 border-slate-900 pt-2 font-black text-xs uppercase">{currentUser.name}</div>
                                        </div>
                                        <div className="text-center space-y-20">
                                            <p className="font-bold text-xs uppercase tracking-widest">Koordinator BK,</p>
                                            <div className="border-t-2 border-slate-900 pt-2 font-black text-xs uppercase">(..........................................)</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'admin' && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                                    <h3 className="font-bold text-[10px] uppercase text-blue-600 mb-4 tracking-widest">Tambah Siswa</h3>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        setStudents([...students, { id: fd.get('nis'), name: fd.get('nm'), class: fd.get('kls') }]);
                                        e.target.reset();
                                    }} className="grid md:grid-cols-4 gap-3">
                                        <input name="nis" placeholder="NISN" required className="border-2 border-slate-100 rounded-xl p-3 text-xs font-bold" />
                                        <input name="nm" placeholder="Nama Lengkap" required className="border-2 border-slate-100 rounded-xl p-3 text-xs font-bold" />
                                        <input name="kls" placeholder="Kelas" required className="border-2 border-slate-100 rounded-xl p-3 text-xs font-bold" />
                                        <button className="bg-blue-600 text-white rounded-xl font-bold text-[10px] uppercase">Simpan</button>
                                    </form>
                                    <button onClick={() => setShowBulkModal(true)} className="mt-4 flex items-center gap-2 text-blue-500 font-black text-[10px] uppercase"><Icons.FileUp /> Impor Massal</button>
                                </div>
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b flex justify-between items-center">
                                        <span className="font-black text-[10px] text-slate-400 uppercase">Database Siswa</span>
                                        <div className="relative"><span className="absolute left-3 top-2 text-slate-400"><Icons.Search /></span><input placeholder="Cari siswa..." className="pl-9 pr-4 py-1.5 bg-white border border-slate-200 rounded-full text-[10px] font-bold outline-none" onChange={(e) => setSearchTerm(e.target.value)} /></div>
                                    </div>
                                    <div className="max-h-60 overflow-y-auto">
                                        <table className="w-full text-sm">
                                            <tbody className="divide-y divide-slate-100">
                                                {students.filter(s => s.name.toLowerCase().includes(searchTerm.toLowerCase())).map(student => (
                                                    <tr key={student.id} className="hover:bg-slate-50">
                                                        <td className="p-4 font-bold text-xs">{student.name}</td>
                                                        <td className="p-4 text-slate-400 text-[10px] font-bold uppercase">{student.id} • {student.class}</td>
                                                        <td className="p-4 text-right"><button onClick={() => setStudents(students.filter(s => s.id !== student.id))} className="text-slate-300 hover:text-red-500 transition-colors"><Icons.X /></button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'guide' && (
                            <div className="space-y-8 animate-in fade-in duration-500 pb-12">
                                <div className="bg-blue-600 p-8 rounded-[40px] text-white shadow-xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h2 className="text-2xl font-black uppercase tracking-tight mb-2">Pusat Bantuan</h2>
                                        <p className="text-blue-100 text-xs font-bold uppercase tracking-widest opacity-80">Panduan Penggunaan Sistem Keterlambatan Digital</p>
                                    </div>
                                    <div className="absolute -right-10 -bottom-10 opacity-10 rotate-12"><Icons.Book /></div>
                                </div>

                                <div className="grid md:grid-cols-2 gap-6">
                                    <section className="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 space-y-4">
                                        <div className="flex items-center gap-3 text-blue-600">
                                            <div className="p-2 bg-blue-50 rounded-lg"><Icons.Camera /></div>
                                            <h3 className="font-black text-xs uppercase tracking-widest">Alur Pencatatan</h3>
                                        </div>
                                        <ul className="space-y-3">
                                            {[
                                                "Aktifkan Kamera di tab Scanner.",
                                                "Arahkan QR Code kartu pelajar ke kotak scanner.",
                                                "Jika QR rusak, masukkan NISN secara manual pada kolom input.",
                                                "Tekan Enter atau klik tombol 'Catat' untuk menyimpan.",
                                                "Sistem akan menghitung keterlambatan hanya pada bulan berjalan."
                                            ].map((text, i) => (
                                                <li key={i} className="flex gap-3 text-xs text-slate-500 font-medium">
                                                    <span className="text-blue-400 font-black">{i+1}.</span>
                                                    {text}
                                                </li>
                                            ))}
                                        </ul>
                                    </section>

                                    <section className="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 space-y-4">
                                        <div className="flex items-center gap-3 text-orange-600">
                                            <div className="p-2 bg-orange-50 rounded-lg"><Icons.AlertTriangle /></div>
                                            <h3 className="font-black text-xs uppercase tracking-widest">Rekapan Per Bulan</h3>
                                        </div>
                                        <div className="p-4 bg-slate-50 rounded-2xl space-y-3">
                                            <p className="text-[11px] text-slate-500 leading-relaxed">
                                                Gunakan fitur <b>Filter</b> di tab Laporan BK untuk melihat data bulan sebelumnya. Sistem menyimpan log dengan informasi waktu lengkap sehingga rekapan dapat dipisah secara akurat.
                                            </p>
                                        </div>
                                    </section>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest print-hidden flex justify-center items-center gap-3">
                        <div className="w-4 h-4"><Icons.Calendar /></div>
                        <span>SISTEM KETERLAMBATAN SISWA DIGITAL &bull; {currentDateTime}</span>
                    </footer>

                    {showBulkModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white rounded-[40px] shadow-2xl w-full max-w-lg overflow-hidden animate-in zoom-in duration-200">
                                <div className="p-6 bg-blue-600 text-white flex justify-between items-center"><h3 className="font-black uppercase text-xs tracking-widest">Impor Massal (CSV)</h3><button onClick={() => setShowBulkModal(false)}><Icons.X /></button></div>
                                <div className="p-8 space-y-4">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Format: NISN, Nama, Kelas (Pisahkan baris per siswa)</p>
                                    <textarea value={bulkInput} onChange={(e) => setBulkInput(e.target.value)} placeholder="Contoh:&#10;2024001, Ahmad Fauzi, 7-A&#10;2024002, Budi Utomo, 8-B" className="w-full h-48 bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-mono text-xs outline-none focus:border-blue-500" />
                                    <button onClick={() => {
                                        const lines = bulkInput.split('\n');
                                        const newStudents = [...students];
                                        lines.forEach(l => {
                                            const parts = l.split(',');
                                            if (parts.length >= 3) newStudents.push({ id: parts[0].trim(), name: parts[1].trim(), class: parts[2].trim() });
                                        });
                                        setStudents(newStudents); setBulkInput(''); setShowBulkModal(false);
                                    }} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl">Proses Impor</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
